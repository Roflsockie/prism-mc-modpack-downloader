<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modpack Downloader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#16213e,#0f3460);padding:20px 30px;display:flex;align-items:center;gap:15px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.header h1{font-size:1.4em;color:#e94560}
.header span{font-size:.85em;color:#888}
.container{max-width:900px;margin:20px auto;padding:0 15px}

/* Search */
.search-box{display:flex;gap:10px;margin-bottom:20px}
.search-box input{flex:1;padding:12px 16px;border:2px solid #333;border-radius:8px;background:#16213e;color:#fff;font-size:1em;outline:none;transition:border .2s}
.search-box input:focus{border-color:#e94560}
.search-box button{padding:12px 24px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer;transition:background .2s}
.search-box button:hover{background:#c73652}
.search-box button:disabled{background:#555;cursor:not-allowed}

/* Results */
.results{display:grid;gap:12px}
.modpack-card{background:#16213e;border:1px solid #333;border-radius:10px;padding:15px;display:flex;gap:15px;cursor:pointer;transition:border .2s,transform .1s}
.modpack-card:hover{border-color:#e94560;transform:translateY(-2px)}
.modpack-card img{width:80px;height:80px;border-radius:8px;object-fit:cover;background:#0f3460}
.modpack-info{flex:1}
.modpack-info h3{color:#fff;margin-bottom:4px;font-size:1.05em}
.modpack-info .meta{font-size:.8em;color:#888;margin-bottom:6px}
.modpack-info .summary{font-size:.85em;color:#aaa;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Detail */
.detail{background:#16213e;border:1px solid #333;border-radius:10px;padding:20px}
.detail-header{display:flex;gap:20px;margin-bottom:20px}
.detail-header img{width:120px;height:120px;border-radius:10px;object-fit:cover;background:#0f3460}
.detail-header h2{color:#fff;font-size:1.3em}
.detail-header .meta{color:#888;font-size:.85em;margin-top:5px}
.detail-header .summary{color:#aaa;font-size:.9em;margin-top:10px;line-height:1.5}
.back-btn{background:none;border:1px solid #555;color:#aaa;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85em;margin-bottom:15px}
.back-btn:hover{border-color:#e94560;color:#fff}

/* Files table */
.files-table{width:100%;border-collapse:collapse;margin-top:10px}
.files-table th{text-align:left;padding:10px;border-bottom:2px solid #333;color:#e94560;font-size:.85em}
.files-table td{padding:10px;border-bottom:1px solid #222;font-size:.9em}
.files-table tr:hover{background:#1a1a3e}
.dl-btn{background:#e94560;color:#fff;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:.85em;transition:background .2s}
.dl-btn:hover{background:#c73652}
.dl-btn:disabled{background:#555;cursor:not-allowed}

/* Progress */
.progress-box{background:#0f3460;border:1px solid #333;border-radius:10px;padding:20px;margin-top:20px}
.progress-bar{height:8px;background:#333;border-radius:4px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#e94560,#ff6b6b);border-radius:4px;transition:width .3s;width:0%}
.progress-text{font-size:.9em;color:#aaa}
.progress-msg{font-size:.85em;color:#e94560;margin-top:5px}

/* Done */
.done-box{background:#16213e;border:2px solid #4caf50;border-radius:10px;padding:20px;margin-top:20px;text-align:center}
.done-box h3{color:#4caf50;margin-bottom:10px}
.done-box a{display:inline-block;margin-top:10px;padding:10px 30px;background:#4caf50;color:#fff;text-decoration:none;border-radius:8px;font-weight:bold;transition:background .2s}
.done-box a:hover{background:#45a049}

/* Error */
.error-box{background:#3e1620;border:1px solid #e94560;border-radius:10px;padding:15px;margin-top:15px;color:#ff6b6b}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:8px;margin-top:15px}
.pagination button{background:#16213e;border:1px solid #333;color:#aaa;padding:6px 14px;border-radius:6px;cursor:pointer}
.pagination button:hover{border-color:#e94560;color:#fff}
.pagination button.active{background:#e94560;border-color:#e94560;color:#fff}

/* Settings Modal */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
.modal-content{background:#16213e;border:1px solid #333;border-radius:12px;padding:25px;max-width:400px;width:90%}
.modal-content h2{color:#fff;margin-bottom:15px;font-size:1.2em}
.modal-content input{width:100%;padding:10px;margin-bottom:20px;background:#0f3460;border:1px solid #333;border-radius:6px;color:#fff;outline:none}
.modal-content .btns{display:flex;justify-content:flex-end;gap:10px}
.modal-content .btn{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.85em;border:none}
.btn-save{background:#e94560;color:#fff}
.btn-cancel{background:#333;color:#aaa}

/* Loader */
.loader{display:inline-block;width:18px;height:18px;border:2px solid #555;border-top-color:#e94560;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}

.empty{text-align:center;color:#666;padding:40px;font-size:1.1em}
</style>
</head>
<body>

<div class="header">
    <h1 style="flex:1">Modpack Downloader</h1>
    <span style="margin-right:15px">CurseForge &mdash; поиск и скачивание модпаков с модами</span>
    <button onclick="showSettings()" style="background:none;border:1px solid #555;color:#aaa;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.8em">Настройки API</button>
</div>

<div class="container" id="app">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск модпака на CurseForge..." autofocus>
        <button id="searchBtn" onclick="doSearch()">Найти</button>
    </div>
    <div id="content">
        <div class="empty">Введите название модпака и нажмите "Найти"</div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2 style="margin-bottom:10px">Настройки CurseForge API</h2>
        <p style="font-size:.8em;color:#aaa;margin-bottom:15px">Введите ваш API ключ для доступа к скачиванию модов.</p>
        <input type="text" id="apiKeyInput" placeholder="API Key...">
        <div class="btns">
            <button class="btn btn-cancel" onclick="closeSettings()">Отмена</button>
            <button class="btn btn-save" onclick="saveSettings()">Сохранить</button>
        </div>
    </div>
</div>

<script>
const API = '';
let state = {view:'search', page:0, modpack:null, query:''};

async function showSettings(){
    const modal = el('settingsModal');
    const input = el('apiKeyInput');
    try {
        const r = await fetch(`${API}/api/config`);
        const data = await r.json();
        input.value = data.api_key || '';
    } catch(e) {
        input.value = '';
    }
    modal.style.display = 'flex';
}

function closeSettings(){
    el('settingsModal').style.display = 'none';
}

async function saveSettings(){
    const key = el('apiKeyInput').value.trim();
    try {
        const r = await fetch(`${API}/api/config`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({api_key: key})
        });
        if (!r.ok) throw new Error('Ошибка сохранения');
        closeSettings();
    } catch(e) {
        alert('Ошибка: ' + e.message);
    }
}

document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

async function doSearch(page){
    const q = document.getElementById('searchInput').value.trim();
    if(!q){
        alert('Пожалуйста, введите название модпака');
        return;
    }
    if(page === undefined) page = 0;
    state = {view:'search', page, query:q, modpack:null};
    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = 'Поиск...';
    el('content').innerHTML = '<div class="empty"><span class="loader"></span> Поиск...</div>';
    try{
        console.log(`Searching for: ${q}, page: ${page}`);
        const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}&page=${page}`);
        if(!r.ok) throw new Error(`Сервер ответил ошибкой: ${r.status}`);
        const data = await r.json();
        if(data.error) throw new Error(data.error);
        renderSearch(data);
    }catch(e){
        console.error('Search error:', e);
        el('content').innerHTML = `<div class="error-box">Ошибка поиска: ${esc(e.message)}</div>`;
    }finally{
        btn.disabled = false;
        btn.textContent = 'Найти';
    }
}

function renderSearch(data){
    if(!data.results.length){
        el('content').innerHTML = '<div class="empty">Ничего не найдено</div>';
        return;
    }
    let h = '<div class="results">';
    for(const m of data.results){
        const img = m.logo ? `<img src="${esc(m.logo)}" onerror="this.style.display='none'">` : '';
        h += `<div class="modpack-card" onclick="showDetail(${m.id},'${esc(m.name)}','${esc(m.summary)}','${esc(m.logo)}','${esc(m.authors)}',${m.downloads})">
            ${img}
            <div class="modpack-info">
                <h3>${esc(m.name)}</h3>
                <div class="meta">${esc(m.authors)} &bull; ${fmtNum(m.downloads)} загрузок</div>
                <div class="summary">${esc(m.summary)}</div>
            </div>
        </div>`;
    }
    h += '</div>';
    // Pagination
    const totalPages = Math.ceil(data.total / 20);
    if(totalPages > 1){
        h += '<div class="pagination">';
        if(state.page > 0) h += `<button onclick="doSearch(${state.page-1})">&larr; Назад</button>`;
        h += `<button class="active">${state.page+1}</button>`;
        if(state.page < totalPages-1) h += `<button onclick="doSearch(${state.page+1})">Вперёд &rarr;</button>`;
        h += '</div>';
    }
    el('content').innerHTML = h;
}

async function showDetail(id, name, summary, logo, authors, downloads){
    state.view = 'detail';
    state.modpack = {id, name, summary, logo, authors, downloads};
    el('content').innerHTML = `<div class="detail">
        <button class="back-btn" onclick="backToSearch()">&larr; Назад к поиску</button>
        <div class="detail-header">
            ${logo ? `<img src="${esc(logo)}" onerror="this.style.display='none'">` : ''}
            <div>
                <h2>${esc(name)}</h2>
                <div class="meta">${esc(authors)} &bull; ${fmtNum(downloads)} загрузок</div>
                <div class="summary">${esc(summary)}</div>
            </div>
        </div>
        <div id="files"><span class="loader"></span> Загрузка версий...</div>
    </div>`;
    try{
        const r = await fetch(`${API}/api/modpack/${id}/files`);
        const data = await r.json();
        if(data.error) throw new Error(data.error);
        renderFiles(data.files, name);
    }catch(e){
        el('files').innerHTML = `<div class="error-box">Ошибка: ${esc(e.message)}</div>`;
    }
}

function renderFiles(files, mpName){
    if(!files.length){
        el('files').innerHTML = '<div class="empty">Версии не найдены</div>';
        return;
    }
    let h = `<table class="files-table">
        <tr><th>Версия</th><th>Дата</th><th>Размер</th><th>Игра</th><th></th></tr>`;
    for(const f of files){
        const d = f.date ? new Date(f.date).toLocaleDateString('ru-RU') : '—';
        h += `<tr>
            <td><strong>${esc(f.name)}</strong></td>
            <td>${d}</td>
            <td>${f.size_mb} МБ</td>
            <td style="font-size:.8em;color:#888">${esc(f.version)}</td>
            <td><button class="dl-btn" onclick="startDownload(${state.modpack.id},${f.id},'${esc(f.name)}',this)">Скачать с модами</button></td>
        </tr>`;
    }
    h += '</table>';
    el('files').innerHTML = h;
}

async function startDownload(modpackId, fileId, name, btn){
    btn.disabled = true;
    btn.textContent = 'Запуск...';
    // Show progress box
    let pb = el('progressBox');
    if(!pb){
        const div = document.createElement('div');
        div.id = 'progressBox';
        el('content').querySelector('.detail').appendChild(div);
        pb = div;
    }
    pb.innerHTML = `<div class="progress-box">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <strong style="font-size:1em">${esc(name)}</strong>
            <span style="font-size:.8em; color:#888">Сборка инстанса Prism...</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
        <div style="display:flex; justify-content:space-between; margin:5px 0">
            <span style="font-size:.9em; font-weight:bold" id="pPct">0%</span>
            <span style="font-size:.9em" id="pSpeed">0 MB/s</span>
        </div>
        <div class="progress-text" id="pText" style="margin-bottom:4px">Подготовка...</div>
        <div id="pMsg" style="font-size:.85em; color:#aaa; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">Ожидание...</div>
        <div id="pETA" style="font-size:.8em; color:#666; text-align:right">Осталось: ---</div>
    </div>`;
    try{
        const r = await fetch(`${API}/api/download`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({modpack_id:modpackId, file_id:fileId, display_name:name})
        });
        const data = await r.json();
        if(data.error) throw new Error(data.error);
        pollProgress(data.download_id);
    }catch(e){
        pb.innerHTML = `<div class="error-box">Ошибка запуска: ${esc(e.message)}</div>`;
        btn.disabled = false;
        btn.textContent = 'Скачать с модами';
    }
}

async function pollProgress(dlId){
    const maxIter = 1800; // 15 min max (modpacks can be large)
    for(let i=0; i<maxIter; i++){
        await new Promise(r => setTimeout(r, 500));
        try{
            const r = await fetch(`${API}/api/progress/${dlId}`);
            const d = await r.json();
            if (i % 10 === 0) console.log(`[${d.progress||0}%] ${d.message}`);
            if(d.status === 'done'){
                renderDone(dlId, d);
                return;
            }
            if(d.status === 'error'){
                el('progressBox').innerHTML = `<div class="error-box">${esc(d.message)}</div>`;
                return;
            }
            // Update progress
            const pMsg = el('pMsg');
            if(d.current_file){
                pMsg.innerHTML = `<span style="color:#e94560;font-weight:bold">${esc(d.current_file)}</span>`;
            }else{
                pMsg.textContent = d.message || '...';
            }
            const pct = d.progress !== undefined ? d.progress : (d.total > 0 ? Math.round((d.done/d.total)*100) : 0);
            el('pFill').style.width = pct + '%';
            el('pFill').style.animation = (pct === 0 || d.progress === undefined) ? 'pulse 1.5s infinite' : 'none';
            el('pPct').textContent = pct + '%';
            if(d.done > 0 && d.total > 0){
                el('pText').textContent = `${d.done} / ${d.total} модов (${pct}%)`;
            }else{
                el('pText').textContent = d.message || 'Подготовка...';
            }
            el('pSpeed').textContent = d.speed || '';
            el('pETA').textContent = d.eta ? `Осталось: ${d.eta}` : '';
        }catch(e){
            console.warn('Poll error (retrying):', e);
            el('pMsg').textContent = 'Ошибка соединения, повтор...';
        }
    }
    el('progressBox').innerHTML = '<div class="error-box">Таймаут (15 мин). Проверьте папку download вручную.</div>';
}

function renderDone(dlId, d){
    el('progressBox').innerHTML = `<div class="done-box">
        <h3>Модпак скачан!</h3>
        <p>${esc(d.message)}</p>
        ${d.failed ? `<p style="color:#ff6b6b">Не удалось скачать: ${d.failed} модов</p>` : ''}
        <p style="font-size:.85em;color:#888">Файл: ${esc(d.filename)} (${d.size_mb} МБ)</p>
        <a href="${API}/api/file/${dlId}">Скачать ZIP-архив</a>
        <p style="font-size:.8em;color:#666;margin-top:10px"><strong>Импорт в Prism Launcher:</strong><br>
        1. Откройте Prism Launcher<br>
        2. Нажмите «Добавить инстанс» → «Импортировать» → выберите ZIP-файл<br>
        3. Или просто перетащите ZIP в окно Prism Launcher</p>
    </div>`;
}

function backToSearch(){
    state.view = 'search';
    state.modpack = null;
    el('content').innerHTML = '<div class="empty">Введите название модпака и нажмите "Найти"</div>';
}

function el(id){ return document.getElementById(id); }
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fmtNum(n){ return n>=1e6?(n/1e6).toFixed(1)+'M' : n>=1e3?(n/1e3).toFixed(1)+'K' : String(n); }
</script>
</body>
</html>
